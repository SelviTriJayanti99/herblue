<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Registrasi - HerBlue</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body style="background: linear-gradient(135deg, #f4f0ff 0%, #dcd0ff 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center;">
<header>
        <div class="container">
             <div class="logo">
            <img src="logo.png" alt="HerBlue" style="height: 60px; width: auto; display: block;">
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">Beranda</a></li>
                    <li><a href="about.html">Tentang Kami</a></li>
                    <li><a href="index.html#menu">Menu</a></li>
                    <li><a href="contact.html">Kontak</a></li>
                    <li><a href="faq.html">FAQs</a></li>
                    <li><a href="profil.html"style="color: #4b0082;">Profile</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <div class="auth-container" style="background: white; width: 100%; max-width: 400px; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center;">
        <div class="logo" style="margin-bottom: 30px;">HERBLUE</div>

        <div id="login-form">
            <h2 style="margin-bottom: 20px; color: #333;">Selamat Datang!</h2>
            <form onsubmit="handleLogin(event)">
                <input type="text" placeholder="Email" required style="width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 10px;">
                <input type="password" placeholder="Password" required style="width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 10px;">
                <button type="submit" class="btn" style="width: 100%; border: none; cursor: pointer;">Masuk</button>
            </form>
            <p style="margin-top: 20px; font-size: 14px; color: #666;">
                Belum punya akun? <a href="javascript:void(0)" onclick="toggleAuth()" style="color: #4b0082; font-weight: bold; text-decoration: none;">Daftar di sini</a>
            </p>
        </div>

        <div id="register-form" style="display: none;">
            <h2 style="margin-bottom: 20px; color: #333;">Daftar Akun</h2>
            <form onsubmit="handleRegister(event)">
                <input type="text" id="reg-nama" placeholder="Nama Lengkap" required style="width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 10px;">
                <input type="tel" placeholder="Nomor Tlp" required style="width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 10px;">
                <input type="password" placeholder="Buat Password" required style="width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 10px;">
                <button type="submit" class="btn" style="width: 100%; border: none; cursor: pointer;">Kirim Kode OTP</button>
            </form>
            <p style="margin-top: 20px; font-size: 14px; color: #666;">
                Sudah punya akun? <a href="javascript:void(0)" onclick="toggleAuth()" style="color: #4b0082; font-weight: bold; text-decoration: none;">Masuk</a>
            </p>
        </div>
    </div>

    <div id="notif-auth" style="display: none; position: fixed; top: 20px; background: #d4edda; color: #155724; padding: 15px 25px; border-radius: 8px; border: 1px solid #c3e6cb; z-index: 10000; box-shadow: 0 4px 6px rgba(0,0,0,0.1); align-items: center; gap: 10px;">
        <i class="fas fa-check-circle"></i>
        <span id="notif-text"></span>
    </div>

    <script>
        // Fungsi pindah tampilan Login <-> Register
        function toggleAuth() {
            const login = document.getElementById('login-form');
            const register = document.getElementById('register-form');
            if (login.style.display === "none") {
                login.style.display = "block";
                register.style.display = "none";
            } else {
                login.style.display = "none";
                register.style.display = "block";
            }
        }

        // Fungsi Simulasi Login
        function handleLogin(e) {
            e.preventDefault();
            showNotif("Login Berhasil! Mengalihkan ke profil...");
            setTimeout(() => {
                window.location.href = "profil.html";
            }, 2000);
        }

        // Fungsi Simulasi Registrasi
        function handleRegister(e) {
            e.preventDefault();
            const nama = document.getElementById('reg-nama').value;
            showNotif("Pendaftaran Berhasil! Halo " + nama + ", kode OTP telah dikirim.");
            setTimeout(() => {
                alert("Masukkan 4 kode unik (Contoh: 1234)");
                window.location.href = "profile.html";
            }, 2000);
        }

        function showNotif(pesan) {
            const notif = document.getElementById('notif-auth');
            document.getElementById('notif-text').innerText = pesan;
            notif.style.display = "flex";
            setTimeout(() => { notif.style.display = "none"; }, 3000);
        }
    </script>
</body>
</html>
